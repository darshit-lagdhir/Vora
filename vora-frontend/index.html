<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vora is a state-of-the-art virtual event hosting platform. Seamlessly manage virtual conferences, interactive webinars, attendee registration, and post-event resource sharing."
    />

    <link
      rel="preload"
      href="/fonts/Panchang-Extrabold.otf"
      as="font"
      type="font/otf"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/Basement.otf"
      as="font"
      type="font/otf"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/Boska-Bold.otf"
      as="font"
      type="font/otf"
      crossorigin="anonymous"
    />

    <title>Vora - Premium Virtual Event Hosting & Management Ecosystem</title>
    <script>
      (function () {
        const theme = localStorage.getItem('vora-theme') || 'dark';
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body class="bg-brand-dark text-slate-100">
    <div id="root">
      <!-- App-Wide Boot Preloader Screen -->
      <div
        id="vora-preload-screen"
        style="
          position: fixed;
          inset: 0;
          background: #09090b;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 99999;
          font-family: 'Clash Display', 'Cabinet Grotesk', system-ui, sans-serif;
        "
      >
        <div
          style="
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
          "
        >
          VORA
        </div>
        <div
          style="
            width: 100px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
            border-radius: 9px;
          "
        >
          <div
            style="
              position: absolute;
              left: -100px;
              top: 0;
              bottom: 0;
              width: 100px;
              background: #ffffff;
              animation: vora-pre-glide 1.6s infinite ease-in-out;
            "
          ></div>
        </div>
      </div>
      <style>
        @keyframes vora-pre-glide {
          0% {
            left: -100px;
          }
          50% {
            left: 0;
          }
          100% {
            left: 100px;
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
